<!DOCTYPE html>
<html lang="hi" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>शिक्षाखेल - ऑफ़लाइन (Offline)</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Noto+Sans+Devanagari:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/index.css">
    <link rel="icon" href="/icons/favicon.svg" type="image/svg+xml">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: var(--bg-grad, #0f111a);
            color: white;
            font-family: 'Baloo 2', 'Noto Sans Devanagari', sans-serif;
            text-align: center;
            padding: 2rem;
            box-sizing: border-box;
        }
        .offline-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem 2rem;
            border-radius: 20px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        .offline-icon {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        h1 {
            font-size: 1.8rem;
            margin: 0 0 0.5rem 0;
            color: #F87171;
        }
        p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 2rem;
        }
        button {
            background: linear-gradient(135deg, #8B5CF6, #7C3AED);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.2rem;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
            width: 100%;
        }
        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="offline-icon">🦖</div>
        <h1>कोई इंटरनेट नहीं</h1>
        <p>लगता है आपका इंटरनेट कनेक्शन टूट गया है। कृपया नेटवर्क चेक करें।</p>
        <button onclick="window.location.reload()">दोबारा कोशिश करें 🔄</button>
    </div>
</body>
</html>
